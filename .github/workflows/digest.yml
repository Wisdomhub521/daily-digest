name: daily-digest
on:
  schedule:
    - cron: "40 20 * * *"     # ★UTC 20:40 = 北京时间次日 04:40（GitHub cron 只认 UTC）
  workflow_dispatch:           # 允许在网页手动触发，调试用
permissions:
  contents: write              # 允许把 docs/ 和 seen.json commit 回仓库
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install feedparser requests trafilatura feedgen openai
      - name: Run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DIGEST_MODE: daily
          SITE_URL: https://wisdomhub521.github.io/daily-digest   # ★改这里
        run: python main.py
      - name: Commit
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add docs seen.json output
          git diff --cached --quiet || git commit -m "digest $(date -u +%F)"
          git push
