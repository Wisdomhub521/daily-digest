name: rss-digest
on:
  schedule:
    # ★ GitHub cron 只认 UTC；避开整点(尤其00:00 UTC)与圆整分钟，用奇怪分钟降被跳过率
    - cron: "17 21 * * *"     # 21:17 UTC = 次日 05:17 CST  ← 晨间主跑（赶 8 点前）
    - cron: "23 22 * * *"     # 22:23 UTC = 次日 06:23 CST  ← 晨间备用（主跑被跳过时兜底）
  workflow_dispatch:          # 手动触发（保留）

permissions:
  contents: write

concurrency:                  # 主跑/备用若撞上，排队不并发，避免 push 冲突
  group: rss-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.13" }

      - name: Install deps
        run: pip install feedparser requests trafilatura feedgen openai

      - name: Run digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DIGEST_MODE: rolling
          LOOKBACK_HOURS: "30"
          SITE_URL: https://wisdomhub521.github.io/daily-digest
        run: python main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add docs seen.json 
          git diff --cached --quiet || git commit -m "digest $(date -u +%FT%H:%MZ)"
          git push
