name: RSS Daily Digest (demo)

on:
  workflow_dispatch:          # 手动触发：Actions 页点 Run
  # schedule:
  #   - cron: "30 20 * * *"   # 04:30 Asia/Shanghai = UTC 前一天 20:30；切 daily 模式后再取消注释

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DIGEST_MODE: demo         # demo=最新N篇不卡日期；正式改 daily
      DEMO_MAX: "3"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run digest
        run: python main.py
      - name: Show digest in log
        run: cat output/*.md
      - uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: output/*.md
